name: Deploy Fullstack to Aliyun ECS

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # ── 1. Checkout ──
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # ── 3. Install & Build Frontend ──
      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      # ── 4. Setup SSH ──
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}
          log-public-key: false

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      # ── 5. Deploy Frontend (dist/) ──
      - name: Deploy frontend to Aliyun ECS
        run: |
          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./dist/ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/var/www/ajan03.xyz/frontend/

      # ── 6. Deploy Backend ──
      - name: Deploy backend to Aliyun ECS
        run: |
          rsync -avz --delete \
            --exclude='venv' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.env' \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./backend/ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/var/www/ajan03.xyz/backend/

      # ── 7. Fix permissions & Restart Backend Service ──
       # ── 7. Fix permissions & Restart Backend Service ──
       - name: Install backend deps & restart service
         run: |
           ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} 'bash -s' <<'EOF'
           set -e
           cd /var/www/ajan03.xyz/backend
           chown -R www-data:www-data /var/www/ajan03.xyz
           
           # 查找可用的 Python 解释器（改进版本）
           PYTHON_CMD=""
           for python_version in python3.11 python3 python; do
             if command -v "$python_version" &>/dev/null; then
               PYTHON_CMD="$python_version"
               break
             fi
           done
           
           # 验证 Python 是否找到
           if [ -z "$PYTHON_CMD" ]; then
             echo "错误: 找不到 Python 解释器"
             apt-get update -qq
             apt-get install -y python3 python3-venv
             PYTHON_CMD="python3"
           fi
           
           echo "使用 Python: $PYTHON_CMD"
           
           # 确保 venv 模块可用
           if ! $PYTHON_CMD -m venv --help &>/dev/null; then
               apt-get update -qq
               apt-get install -y -qq python3-venv python3.11-venv 2>/dev/null || apt-get install -y -qq python3-venv
           fi
           
           # 重新创建虚拟环境
           rm -rf venv
           $PYTHON_CMD -m venv venv
           source venv/bin/activate
           pip install --upgrade pip
           pip install -r requirements.txt
           sudo systemctl restart macrofactor-backend || true
           sleep 3
           sudo systemctl status macrofactor-backend --no-pager || true
           EOF

      # ── 8. Health Check ──
      - name: Health check
        run: |
          echo "Waiting for service to start..."
          sleep 5
          curl -sf https://ajan03.xyz/api/health || echo "Health check failed (may need DNS propagation)"
