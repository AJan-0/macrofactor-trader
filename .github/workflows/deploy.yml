name: Deploy Fullstack to Aliyun ECS

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # ── 1. Checkout ──
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # ── 3. Install & Build Frontend ──
      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      # ── 4. Setup SSH ──
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}
          log-public-key: false

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      # ── 5. Deploy Frontend (dist/) ──
      - name: Deploy frontend to Aliyun ECS
        run: |
          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./dist/ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/var/www/ajan03.xyz/frontend/

      # ── 6. Deploy Backend ──
      - name: Deploy backend to Aliyun ECS
        run: |
          rsync -avz --delete \
            --exclude='venv' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.env' \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./backend/ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/var/www/ajan03.xyz/backend/

      # ── 7. Fix permissions & Restart Backend Service ──
      - name: Install backend deps & restart service
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} 'bash -s' <<'EOF'
          set -e
          cd /var/www/ajan03.xyz/backend
          sudo chown -R www-data:www-data /var/www/ajan03.xyz || true

          # 查找可用的 Python 解释器
          PYTHON_CMD=""
          for python_version in python3.12 python3.11 python3.10 python3 python; do
            if command -v "$python_version" &>/dev/null; then
              PYTHON_CMD="$python_version"
              break
            fi
          done

          if [ -z "$PYTHON_CMD" ]; then
            echo "错误: 找不到 Python 解释器，尝试安装..."
            sudo apt-get update -qq
            sudo apt-get install -y -qq python3 python3-venv python3-full
            PYTHON_CMD="python3"
          fi

          echo "使用 Python: $PYTHON_CMD"
          $PYTHON_CMD --version

          # 关键修复：检测 ensurepip / venv 是否可用，不可用则安装对应系统包
          if ! $PYTHON_CMD -m ensurepip --help &>/dev/null 2>&1 || ! $PYTHON_CMD -m venv --help &>/dev/null 2>&1; then
            echo "ensurepip/venv 不可用，正在安装对应系统包..."
            sudo apt-get update -qq
            
            # 获取当前 Python 版本号（如 3.12）
            PY_MAJOR=$($PYTHON_CMD -c 'import sys; print(sys.version_info.major)')
            PY_MINOR=$($PYTHON_CMD -c 'import sys; print(sys.version_info.minor)')
            
            # 优先安装对应版本的 venv 包（如 python3.12-venv）
            sudo apt-get install -y -qq "python${PY_MAJOR}.${PY_MINOR}-venv" 2>/dev/null || true
            # 兜底安装通用包
            sudo apt-get install -y -qq python3-venv python3-full 2>/dev/null || true
          fi

          # 清理并重建虚拟环境
          rm -rf venv
          $PYTHON_CMD -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          
          sudo systemctl restart macrofactor-backend || true
          sleep 3
          sudo systemctl status macrofactor-backend --no-pager || true
          EOF

      # ── 8. Health Check ──
      - name: Health check
        run: |
          echo "Waiting for service to start..."
          sleep 5
          curl -sf https://ajan03.xyz/api/health || echo "Health check failed (may need DNS propagation)"
