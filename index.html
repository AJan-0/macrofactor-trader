<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0e1a" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="MacroFactor Trader — 宏观因子与资产价格可视化分析平台" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192x192.png" />
    
    <!-- P1 性能优化：预加载关键资源 -->
    <link rel="preconnect" href="https://min-api.cryptocompare.com" />
    <link rel="preconnect" href="https://api.coingecko.com" />
    <link rel="dns-prefetch" href="https://min-api.cryptocompare.com" />
    <link rel="dns-prefetch" href="https://api.coingecko.com" />
    
    <!-- 预加载首屏关键字体（如果有自定义字体） -->
    <!-- <link rel="preload" href="/fonts/inter.woff2" as="font" type="font/woff2" crossorigin /> -->
    
    <title>MacroFactor Trader</title>
    <script>
      window.__errors__ = [];
      window.addEventListener('error', (e) => {
        window.__errors__.push({
          type: 'error',
          message: e.message,
          filename: e.filename,
          lineno: e.lineno,
          colno: e.colno,
          time: new Date().toISOString()
        });
        console.error('[ERROR EVENT]', e.message);
      }, true);
      window.addEventListener('unhandledrejection', (e) => {
        window.__errors__.push({
          type: 'unhandledrejection',
          reason: String(e.reason),
          time: new Date().toISOString()
        });
        console.error('[REJECTION]', e.reason);
      });
    </script>
  </head>
  <body>
    <noscript>
      <div style="padding:40px;text-align:center;color:#e2e8f0;font-family:system-ui;">
        <h1>JavaScript 已禁用</h1>
        <p>MacroFactor Trader 需要启用 JavaScript 才能运行。</p>
      </div>
    </noscript>
    <div id="root">
      <div id="loading-fallback" style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0a0e1a;color:#94a3b8;font-family:system-ui,sans-serif;">
        <div style="text-align:center;">
          <div style="font-size:24px;margin-bottom:8px;">⚡</div>
          <div style="font-size:14px;">MacroFactor Trader 加载中...</div>
        </div>
      </div>
    </div>
    <script type="module">
      setTimeout(() => {
        const root = document.getElementById('root');
        if (root && root.querySelector('#loading-fallback')) {
          const errors = window.__errors__ || [];
          if (errors.length > 0) {
            root.innerHTML = `
              <div style="padding:40px;color:#e2e8f0;font-family:monospace;background:#0a0e1a;min-height:100vh;overflow:auto;">
                <h2 style="color:#ef4444;">⚠️ 应用加载失败</h2>
                <p style="color:#94a3b8;">检测到以下错误：</p>
                <div style="background:#111827;padding:16px;border-radius:8px;font-size:12px;border:1px solid #1e293b;">
                  ${errors.map((e, i) => `<div style="margin-bottom:8px;color:#94a3b8;"><strong style="color:#ef4444;">${i + 1}. ${e.type}:</strong> ${e.message || e.reason || '未知错误'}</div>`).join('')}
                </div>
                <button onclick="location.reload()" style="margin-top:16px;padding:8px 16px;background:#3b82f6;color:#fff;border:none;border-radius:4px;cursor:pointer;">刷新页面</button>
              </div>
            `;
          }
        }
      }, 8000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
